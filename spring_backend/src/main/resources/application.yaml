spring:
  application:
    name: spring_backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  jwt:
    secret: ${JWT_SECRET_KEY:dev-only-secret-key-must-be-long-enough-for-hs256-signing!!}
    access-token-expiry: 30m
    refresh-token-expiry: 7d
  cookie:
    refresh-token-name: refreshToken
    secure: ${COOKIE_SECURE:false}
    same-site: Strict
    path: /api/v1/auth
  # Cloudflare R2 설정은 application-dev.yaml / application-prod.yaml 에서 프로필별로 관리
