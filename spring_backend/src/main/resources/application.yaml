spring:
  application:
    name: spring_backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  jwt:
    secret: ${JWT_SECRET_KEY:dev-only-secret-key-must-be-long-enough-for-hs256-signing!!}
    access-token-expiry: 30m
    refresh-token-expiry: 7d
  cookie:
    refresh-token-name: refreshToken
    secure: ${COOKIE_SECURE:false}
    # 프론트/백엔드 도메인이 다르면 prod 에서 None 필요 (crossdomain 쿠키). 로컬 dev 기본값 Strict.
    same-site: ${COOKIE_SAME_SITE:Strict}
    path: /api/v1/auth
  mail:
    # 발신 주소 (발송 도메인 인증 필요). prod 는 MAIL_FROM 으로 no-reply@<도메인> 주입.
    from: ${MAIL_FROM:no-reply@pbb.com}
  # Cloudflare R2 설정은 application-dev.yaml / application-prod.yaml 에서 프로필별로 관리
