version: '3.8'

services:
  baseball-mysql:
    image: mysql:8.0
    container_name: baseball-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: baseball_db
      MYSQL_USER: baseball_user
      MYSQL_PASSWORD: baseball_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - baseball-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  baseball-redis:
    image: redis:7.0-alpine
    container_name: baseball-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - baseball-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:

networks:
  baseball-network:
    driver: bridge
